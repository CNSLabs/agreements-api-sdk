server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Link '</api-playground/llms.txt>; rel="llms-txt", </api-playground/skill.md>; rel="service-desc"; type="text/markdown", <https://docs.shodai.network/skill.md>; rel="service-desc"; type="text/markdown", <https://docs.shodai.network/openapi.json>; rel="service-desc"; type="application/json"' always;
    add_header X-Llms-Txt "/api-playground/llms.txt" always;

    location = /llms.txt {
        default_type text/plain;
        try_files /llms.txt =404;
    }

    location = /skill.md {
        default_type text/markdown;
        try_files /skill.md =404;
    }

    location = /api-playground {
        return 301 /api-playground/;
    }

    location ~ ^/api-playground(/|$) {
        rewrite ^/api-playground/?(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.map$ {
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
