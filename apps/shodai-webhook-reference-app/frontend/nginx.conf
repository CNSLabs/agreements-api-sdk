server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Link '</llms.txt>; rel="llms-txt", </skill.md>; rel="service-desc"; type="text/markdown", <https://docs.shodai.network/skill.md>; rel="service-desc"; type="text/markdown", <https://docs.shodai.network/openapi.json>; rel="service-desc"; type="application/json"' always;
    add_header X-Llms-Txt "/llms.txt" always;

    location = /llms.txt {
        default_type text/plain;
        try_files /llms.txt =404;
    }

    location = /skill.md {
        default_type text/markdown;
        try_files /skill.md =404;
    }

    location = /robots.txt {
        default_type text/plain;
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        default_type application/xml;
        try_files /sitemap.xml =404;
    }

    # Redirect /agreements (no trailing slash) to /agreements/ so the
    # browser's base-path and React Router basename align correctly.
    location = /agreements {
        return 301 /agreements/;
    }

    # Allow serving the app when requests include the /agreements prefix.
    # Strip /agreements before resolving files so assets resolve correctly.
    location ~ ^/agreements(/|$) {
        rewrite ^/agreements/?(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.map$ {
        access_log off;
        log_not_found off;
        return 404;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
